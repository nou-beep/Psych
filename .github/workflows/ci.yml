name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Lint runs but does not block CI yet — there are pre-existing
      # lint errors on master (the repo's next.config.mjs also has
      # eslint.ignoreDuringBuilds: true). Remove continue-on-error once
      # those are cleaned up.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
